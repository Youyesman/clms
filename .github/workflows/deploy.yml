name: Deploy to Production (Non-Docker)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Execute remote ssh commands
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            # 1. 코드 최신화 (프론트 build/ 는 repo에 커밋되어 함께 내려옴 — 서버 빌드 안 함)
            cd /home/clms
            git fetch origin
            git reset --hard origin/main

            # 2. 백엔드 셋업 (venv, pip, migrate, collectstatic)
            chmod +x deployment/*.sh
            ./deployment/setup_backend.sh

            # 3. 서비스 재시작
            sudo systemctl restart clms-backend

            # 4. Apache 설정 재적용 및 리로드
            sudo cp /home/clms/deployment/clms.conf /etc/apache2/sites-available/
            sudo systemctl reload apache2
